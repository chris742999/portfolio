<section id="contact">

        <!-- Formspree Form - Updated with the provided endpoint -->
        <form id="contact-form" action="https://formspree.io/f/mqeggkwb" method="POST">
            <input type="text" name="name" id="name" placeholder="Your Name" required>
            <input type="email" name="email" id="email" placeholder="Your Email" required>

    <!-- persistent thank you banner (hidden initially, appears after submit) -->
    <div id="thankYouBanner" class="thankyou-message hidden-message">
        <span>🙏</span>
        <span>Thank you for filling this form — will get back to you ASAP 👍</span>
    </div>

<!-- floating popup (green tick + submitted successfully) -->
<div id="successPopup" class="custom-popup">
    <div class="popup-tick">✓</div>
    <span>Submitted successfully!</span>
</div>

<script>
    (function() {
        // Get DOM elements
        const form = document.getElementById('contact-form');
        const thankYouBanner = document.getElementById('thankYouBanner');
        const successPopup = document.getElementById('successPopup');
        
        // Helper function to show the floating popup message with green tick
        function showSuccessPopup() {
            if (successPopup.classList.contains('show')) {
                successPopup.classList.remove('show');
                setTimeout(() => {
                    successPopup.classList.add('show');
                    setTimeout(() => {
                        successPopup.classList.remove('show');
                    }, 3200);
                }, 20);
            } else {
                successPopup.classList.add('show');
                setTimeout(() => {
                    successPopup.classList.remove('show');
                }, 3200);
            }
        }
        
        // Function to show the inline thank you message
        function showThankYouMessage() {
            if (thankYouBanner.classList.contains('hidden-message')) {
                thankYouBanner.classList.remove('hidden-message');
            } else {
                thankYouBanner.style.animation = 'none';
                thankYouBanner.offsetHeight;
                thankYouBanner.style.animation = null;
            }
        }
        
        let isSubmitting = false;
        
        // Email validation regex
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Handle form submit with Formspree
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const messageInput = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            let hasError = false;
            
            // Validation
            if (!nameInput.value.trim()) {
                nameInput.style.borderColor = "#e53e3e";
                hasError = true;
            } else {
                nameInput.style.borderColor = "";
            }
            
            if (!emailInput.value.trim()) {
                emailInput.style.borderColor = "#e53e3e";
                hasError = true;
            } else if (!isValidEmail(emailInput.value.trim())) {
                emailInput.style.borderColor = "#e53e3e";
                hasError = true;
            } else {
                emailInput.style.borderColor = "";
            }
            
            if (!messageInput.value.trim()) {
                messageInput.style.borderColor = "#e53e3e";
                hasError = true;
            } else {
                messageInput.style.borderColor = "";
            }
            
            if (hasError) {
                return;
            }
            
            isSubmitting = true;
            
            // Save original button text
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "Transmitting... 🛰️";
            submitBtn.disabled = true;
            
            try {
                // Submit to Formspree
                const formData = new FormData(form);
                const response = await fetch('https://formspree.io/f/mqeggkwb', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // Show success messages
                    showThankYouMessage();
                    showSuccessPopup();
                    
                    // Reset form fields
                    form.reset();
                    
                    console.log("✅ Form submitted successfully to Formspree");
                } else {
                    const data = await response.json();
                    if (data.errors) {
                        alert("There was an error with your submission. Please check your input.");
                    } else {
                        alert("Submission failed. Please try again.");
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Network error. Please check your connection and try again.");
            } finally {
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                isSubmitting = false;
            }
        }
        
        // Attach submit event listener
        if (form) {
            form.addEventListener('submit', handleFormSubmit);
        }
        
        // Real-time border reset on input
        const nameField = document.getElementById('name');
        const emailField = document.getElementById('email');
        const messageField = document.getElementById('message');
        
        function resetBorder(e) {
            e.target.style.borderColor = "";
            e.target.style.transform = "";
        }
        
        if (nameField) nameField.addEventListener('input', resetBorder);
        if (emailField) emailField.addEventListener('input', resetBorder);
        if (messageField) messageField.addEventListener('input', resetBorder);
        
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.setAttribute('aria-label', 'Send contact message');
        }
        
        console.log("Contact form ready with Formspree integration");
    })();
    
    const cursor = document.querySelector('.cursor');
    if (cursor) {
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.display = 'block';
        });
    }
</script>
